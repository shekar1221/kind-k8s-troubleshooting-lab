apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: troubleshooting-lab
  labels:
    app: orders-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: troubleshooting-lab
spec:
  selector:
    app: orders-api
  ports:
    - name: http
      port: 80
      targetPort: 80

