apiVersion: apps/v1
kind: Deployment
metadata:
  name: init-wait-demo
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: init-wait-demo
  template:
    metadata:
      labels:
        app: init-wait-demo
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - until nslookup payments-db.troubleshooting-lab.svc.cluster.local; do echo "waiting for payments-db"; sleep 3; done
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80

