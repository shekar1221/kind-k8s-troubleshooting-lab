apiVersion: v1
kind: Service
metadata:
  name: payments-db
  namespace: troubleshooting-lab
spec:
  selector:
    app: payments-db
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-db
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-db
  template:
    metadata:
      labels:
        app: payments-db
    spec:
      containers:
        - name: db-simulator
          image: busybox:1.36
          command: ["sh", "-c", "nc -lk -p 5432 >/dev/null 2>&1"]
          ports:
            - containerPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: init-wait-demo
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: init-wait-demo
  template:
    metadata:
      labels:
        app: init-wait-demo
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - until nslookup payments-db.troubleshooting-lab.svc.cluster.local; do echo "waiting for payments-db"; sleep 3; done
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80

