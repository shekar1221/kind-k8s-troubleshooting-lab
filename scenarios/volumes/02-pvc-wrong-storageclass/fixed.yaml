apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reports-pvc
  namespace: troubleshooting-lab
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports-api
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reports-api
  template:
    metadata:
      labels:
        app: reports-api
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "echo reports > /data/report.txt && sleep 3600"]
          volumeMounts:
            - name: reports
              mountPath: /data
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: reports-pvc

