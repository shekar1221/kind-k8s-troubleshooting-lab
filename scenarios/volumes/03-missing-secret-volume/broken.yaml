apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-volume-demo
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-volume-demo
  template:
    metadata:
      labels:
        app: secret-volume-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "cat /etc/app-secret/password && sleep 3600"]
          volumeMounts:
            - name: app-secret
              mountPath: /etc/app-secret
              readOnly: true
      volumes:
        - name: app-secret
          secret:
            secretName: database-password

