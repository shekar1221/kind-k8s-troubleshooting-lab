apiVersion: v1
kind: ConfigMap
metadata:
  name: app-file-config
  namespace: troubleshooting-lab
data:
  application.yaml: |
    app:
      mode: lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-key-demo
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-key-demo
  template:
    metadata:
      labels:
        app: config-key-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "cat /etc/app/config.yaml && sleep 3600"]
          volumeMounts:
            - name: app-config
              mountPath: /etc/app
      volumes:
        - name: app-config
          configMap:
            name: app-file-config
            items:
              - key: config.yaml
                path: config.yaml

