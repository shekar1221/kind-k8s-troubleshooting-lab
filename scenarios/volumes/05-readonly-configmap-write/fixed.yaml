apiVersion: v1
kind: ConfigMap
metadata:
  name: readonly-config
  namespace: troubleshooting-lab
data:
  app.properties: |
    mode=readonly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: readonly-write-demo
  namespace: troubleshooting-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readonly-write-demo
  template:
    metadata:
      labels:
        app: readonly-write-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - cp /etc/app-config/app.properties /work/app.properties; echo "runtime=true" >> /work/app.properties; cat /work/app.properties; sleep 3600
          volumeMounts:
            - name: readonly-config
              mountPath: /etc/app-config
              readOnly: true
            - name: writable-workdir
              mountPath: /work
      volumes:
        - name: readonly-config
          configMap:
            name: readonly-config
        - name: writable-workdir
          emptyDir: {}

